# ─────────────────────────────────────────────
#  docker-compose.prod.yml  –  PRODUCTION
#  Usage: make prod
#         OR: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
#  NEVER mount source code. NEVER expose Postgres/Redis ports externally.
#  Secrets come from environment or Docker Secrets — never baked into the image.
# ─────────────────────────────────────────────
version: "3.9"

services:

  api:
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
      --log-level warning
      --no-access-log
      --proxy-headers
      --forwarded-allow-ips="*"
    environment:
      APP_ENV: prod
      DEBUG: "false"
      LOG_LEVEL: warning
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  worker:
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=warning
      --concurrency=4
      --queues=pipeline,default
      --max-tasks-per-child=100
    environment:
      APP_ENV: prod
      DEBUG: "false"
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  beat:
    environment:
      APP_ENV: prod
    deploy:
      replicas: 1      # only ever ONE beat instance

  # Flower only accessible internally in prod
  flower:
    ports: []
    environment:
      APP_ENV: prod

  postgres:
    ports: []          # never expose DB port in prod
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    ports: []          # never expose Redis in prod
    command: >
      redis-server /etc/redis/redis.conf
      --requirepass "${REDIS_PASSWORD}"
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru

  # ── Nginx TLS termination ────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: vision_nginx_prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro    # mount your TLS certs here
      - nginx_logs:/var/log/nginx
    networks:
      - vision_net
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  # ── Prometheus + Grafana ─────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: vision_prometheus_prod
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports: []          # internal only; Grafana proxy
    networks:
      - vision_net
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  grafana:
    image: grafana/grafana:latest
    container_name: vision_grafana_prod
    environment:
      GF_SECURITY_ADMIN_PASSWORD_FILE: /run/secrets/grafana_password
      GF_SERVER_ROOT_URL: https://${DOMAIN}/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports: []          # served through nginx
    networks:
      - vision_net
    secrets:
      - grafana_password

secrets:
  postgres_password:
    external: true
  grafana_password:
    external: true

volumes:
  prometheus_data:
  grafana_data:
  nginx_logs: