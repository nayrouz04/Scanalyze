<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password – Scanalyze</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
        }

        h2 {
            color: #1a1a2e;
            margin-bottom: 8px;
            font-size: 24px;
        }

        p.subtitle {
            color: #666;
            margin-bottom: 28px;
            font-size: 14px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            transition: border 0.2s;
            outline: none;
        }

        input:focus { border-color: #4F46E5; }

        .eye-icon {
            position: absolute;
            right: 12px;
            top: 35%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            user-select: none;
        }

        button {
            width: 100%;
            padding: 13px;
            background: #4F46E5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #3730a3; }

        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .message.success {
            background: #d1fae5;
            color: #065f46;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body> 
    <div class="card">
        <h2>Reset your password</h2>
        <p class="subtitle">Enter your new password below.</p>

        <label for="new_password">New Password</label>
        <div class="input-wrapper">
            <input type="password" id="new_password" placeholder="Enter new password" />
            <span class="eye-icon" onclick="togglePassword('new_password')">👁️</span>
        </div>

        <label for="confirm_password">Confirm Password</label>
        <div class="input-wrapper">
            <input type="password" id="confirm_password" placeholder="Confirm new password" />
            <span class="eye-icon" onclick="togglePassword('confirm_password')">👁️</span>
        </div>
        <button onclick="submitReset()">Reset Password</button>

        <div class="message" id="message"></div>
    </div>

    <script>
        // Extract token from URL
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token");


        function togglePassword(fieldId, icon) {
            const input = document.getElementById(fieldId);
            if (input.type === "password") {
                input.type = "text";
            } else {
                input.type = "password";
            }
        }
        async function submitReset() {
            //get the values from the input fields
            const new_password = document.getElementById("new_password").value;
            const confirm_password = document.getElementById("confirm_password").value;
            
            const messageDiv = document.getElementById("message");

            //basic front-end validation
            if (!new_password || !confirm_password) {
                showMessage("Please fill in all fields.", "error");
                return;
            }

            if (new_password !== confirm_password) {
                showMessage("Passwords do not match.", "error");
                return;
            }

            try {
                //send the request to the API
                const response = await fetch("/api/v1/auth/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token, new_password, confirm_password }),
                });

                const data = await response.json();
                //display msg based on response
                if (response.ok) {
                    showMessage("Password reset successfully! You can now log in.", "success");
                } else {
                    showMessage(data.detail || "Something went wrong.", "error");
                }
            } catch (err) {
                showMessage("Network error. Please try again.", "error");
            }
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById("message");
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = "block";
        }
    </script>
</body>
</html>
